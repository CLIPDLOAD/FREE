<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>CLIPDLOAD</title>
    
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="clipdownload.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            color: #e0e0e0;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .fullscreen-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #0f0f0f 100%);
            z-index: -1;
        }
        .header {
            padding: 30px 20px 20px;
            text-align: center;
            z-index: 10;
        }
        .logo-container {
            display: inline-flex;
            align-items: center;
            gap: 16px;
        }
        .logo { width: 70px; height: 70px; object-fit: contain; }
        .brand-text { font-size: 42px; font-weight: 700; letter-spacing: 3px; color: #fff; }
        .subtitle { font-size: 14px; color: #aaa; letter-spacing: 5px; }

        .main-content {
            flex: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 0 20px 20px;
            z-index: 10;
            width: 100%;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 35px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .url-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 12px;
            padding: 18px 20px;
            color: #fff;
            font-size: 16px;
            min-height: 130px;
            resize: vertical;
            margin-bottom: 20px;
        }
        .btn-group {
            display: flex;
            gap: 12px;
        }
        .download-btn, .clear-btn {
            flex: 1;
            padding: 18px;
            font-size: 17px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .download-btn {
            background: linear-gradient(90deg, #ffffff, #e0e0e0);
            color: #0a0a0a;
        }
        .clear-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .download-btn:hover, .clear-btn:hover { transform: translateY(-3px); }
        .download-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 15px 0;
            color: #0a0;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid #ffffff33;
            border-top: 3px solid #0a0;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            text-align: center;
            padding: 20px 0 25px;
            color: #777;
            font-size: 13px;
            z-index: 10;
            width: 100%;
        }
        .developer-link {
            color: #4da6ff;
            text-decoration: underline;
            font-weight: 500;
        }
        .developer-link:hover {
            color: #80c0ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="fullscreen-bg"></div>

    <div class="header">
        <div class="logo-container">
            <img src="clipdownload.png" alt="Clip Logo" class="logo">
            <div>
                <div class="brand-text">CLIPDLOAD</div>
                <div class="subtitle">FREE•FAST•NO ADS</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="glass-card">
            <h2 style="text-align:center; margin-bottom:25px;">Paste TikTok URL</h2>
            <textarea id="urlInput" class="url-input" placeholder="https://www.tiktok.com/@user/video/123456789"></textarea>
            
            <div class="btn-group">
                <button onclick="downloadVideo()" id="downloadBtn" class="download-btn">Download Video</button>
                <button onclick="clearInput()" class="clear-btn">Clear</button>
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>Processing... Please wait</p>
            </div>
        </div>
    </div>

    <div class="footer">
        Developed by <a href="https://www.facebook.com/profile.php?id=61590322097655" target="_blank" class="developer-link">BENHERMOSILLA</a> • © 2026 CLIPDLOAD. All Rights Reserved.
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const loading = document.getElementById('loading');

        async function downloadVideo() {
            const url = urlInput.value.trim();
            if (!url) {
                alert("Paste TikTok URL muna!");
                return;
            }

            downloadBtn.textContent = "Processing...";
            downloadBtn.disabled = true;
            loading.style.display = "block";

            try {
                const response = await fetch('http://127.0.0.1:5000/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const downloadUrl = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = downloadUrl;
                    a.download = `tiktok-video-${Date.now()}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(downloadUrl);
                } else {
                    alert("Error: " + response.statusText);
                }
            } catch (err) {
                console.error(err);
                alert("the server is busy.");
            }

            downloadBtn.textContent = "Download Video";
            downloadBtn.disabled = false;
            loading.style.display = "none";
        }

        function clearInput() {
            urlInput.value = '';
            urlInput.focus();
        }

        // Enter key support
        urlInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !downloadBtn.disabled) {
                downloadVideo();
            }
        });
    </script>
</body>
</html>
